version: v1
kind: readable_storage
name: outcomes_org
storage:
  key: outcomes_org
  set_key: outcomes
readiness_state: complete
schema:
  columns:
    [
      { name: org_id, type: UInt, args: { size: 64 } },
      { name: project_id, type: UInt, args: { size: 64 } },
      { name: key_id, type: UInt, args: { size: 64 } },
      { name: timestamp, type: DateTime },
      { name: outcome, type: UInt, args: { size: 8 } },
      { name: reason, type: String },
      { name: quantity, type: UInt, args: { size: 64 } },
      { name: category, type: UInt, args: { size: 8 } },
      { name: times_seen, type: UInt, args: { size: 64 } },
    ]
  local_table_name: outcomes_hourly_local
  dist_table_name: outcomes_hourly_dist
allocation_policies:
  - name: ConcurrentRateLimitAllocationPolicy
    args:
      required_tenant_types:
        - referrer
      default_config_overrides:
        is_enforced: 0
  - name: BytesScannedWindowAllocationPolicy
    args:
      required_tenant_types:
        - organization_id
        - referrer
      default_config_overrides:
        is_enforced: 1
        throttled_thread_number: 1
        org_limit_bytes_scanned: 100000
  - name: CrossOrgQueryAllocationPolicy
    args:
      required_tenant_types:
        - referrer
      default_config_overrides:
        is_enforced: 0
        is_active: 0
      cross_org_referrer_limits:
        getsentry.quotas.over_usage_shadow:
          max_threads: 4
          concurrent_limit: 10
  - name: ReferrerGuardRailPolicy
    args:
      required_tenant_types:
        - referrer
      default_config_overrides:
        is_enforced: 0
        is_active: 0
query_processors:
  - processor: PrewhereProcessor
    args:
      prewhere_candidates:
        - project_id
        - org_id
  - processor: ClickhouseSettingsOverride
    args:
      overwrite_existing: false
      settings:
        max_execution_time: 10
# Org-level outcomes storage for governed cross-org discovery queries. Mirrors the
# shared outcomes_hourly storage over the same ClickHouse tables but intentionally
# OMITS the OrgIdEnforcer mandatory_condition_checker so a query can scan across
# organizations. The shared `outcomes` storage keeps OrgIdEnforcer; this storage is
# reachable only via the dedicated `outcomes_org` entity and is gated by
# CrossOrgQueryAllocationPolicy (registered referrers only).
