version: v1
kind: entity
name: llm_proxy_cost_raw
schema:
  [
    { name: org_id, type: UInt, args: { size: 64 } },
    { name: project_id, type: UInt, args: { size: 64 } },
    { name: timestamp, type: DateTime },
    { name: time, type: DateTime },
    { name: feature, type: String },
    { name: model, type: String },
    { name: region, type: String },
    { name: call_type, type: String },
    { name: prompt_tokens, type: UInt, args: { size: 32 } },
    { name: completion_tokens, type: UInt, args: { size: 32 } },
    { name: cache_read_tokens, type: UInt, args: { size: 32 } },
    { name: cache_write_tokens, type: UInt, args: { size: 32 } },
    { name: total_cost_usd, type: Float, args: { size: 64 } },
    { name: input_cost_usd, type: Float, args: { size: 64 } },
    { name: output_cost_usd, type: Float, args: { size: 64 } },
    { name: cache_read_cost_usd, type: Float, args: { size: 64 } },
    { name: cache_write_cost_usd, type: Float, args: { size: 64 } },
    { name: litellm_cost_usd, type: Float, args: { size: 64 } },
    { name: is_long_context, type: UInt, args: { size: 8 } },
    { name: is_regional, type: UInt, args: { size: 8 } },
    { name: response_time_ms, type: Float, args: { size: 64 } },
    { name: litellm_call_id, type: String },
  ]

required_time_column: timestamp
storages:
  - storage: llm_proxy_cost_raw
    is_writable: false
storage_selector:
  selector: DefaultQueryStorageSelector
query_processors:
  - processor: BasicFunctionsProcessor
  - processor: TimeSeriesProcessor
    args:
      time_group_columns:
        time: timestamp
      time_parse_columns:
        - timestamp
validate_data_model: error
validators:
  - validator: EntityRequiredColumnValidator
    args:
      required_filter_columns:
        - org_id
