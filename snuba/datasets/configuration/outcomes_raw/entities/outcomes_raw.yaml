version: v1
kind: entity
name: outcomes_raw
schema:
  [
    { name: org_id, type: UInt, args: { size: 64 } },
    { name: project_id, type: UInt, args: { size: 64 } },
    {
      name: key_id,
      type: UInt,
      args: { size: 64, schema_modifiers: [nullable] },
    },
    { name: timestamp, type: DateTime },
    { name: time, type: DateTime },
    { name: outcome, type: UInt, args: { size: 8 } },
    { name: reason, type: String, args: { schema_modifiers: [nullable] } },
    { name: event_id, type: UUID, args: { schema_modifiers: [nullable] } },
    { name: quantity, type: UInt, args: { size: 64 } },
    { name: category, type: UInt, args: { size: 8 } },
  ]

required_time_column: timestamp
storages:
  - storage: outcomes_raw
    is_writable: false
    translation_mappers:
      columns:
        - mapper: ColumnToColumn
          args:
            from_table_name:
            from_col_name: quantity
            to_table_name:
            to_col_name: quantity64
storage_selector:
  selector: DefaultQueryStorageSelector
query_processors:
  - processor: BasicFunctionsProcessor
  - processor: TimeSeriesProcessor
    args:
      time_group_columns:
        time: timestamp
      time_parse_columns:
        - timestamp
validate_data_model: error
validators:
  - validator: EntityRequiredColumnValidator
    args:
      required_filter_columns:
        - org_id
