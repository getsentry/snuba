name: Validate Sentry Options Schema

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  files-changed:
    name: files-changed
    runs-on: ubuntu-latest
    outputs:
      schemas: ${{ steps.changes.outputs.schemas }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for relevant file changes
        uses: getsentry/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2.11.1
        id: changes
        with:
          filters: |
            schemas:
              - 'sentry-options/schemas/**'

  validate-schema:
    if: needs.files-changed.outputs.schemas == 'true'
    needs: files-changed
    name: Validate Schema Evolution
    uses: getsentry/sentry-options/.github/workflows/validate-schema.yml@ceed9df987a4085bd3e662d188a55216d40a92d1
    secrets: inherit
    with:
      schemas-path: sentry-options/schemas
