on:
  pull_request:
  push:
    branches:
      - master
      - release/**

jobs:
  build:
    runs-on: ubuntu-24.04
    name: build
    permissions:
      contents: read
      packages: write
    if: github.repository_owner == 'getsentry'
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: getsentry/action-build-and-push-images@8fc75e483c09a68721f2c8951292ee17f8821766
      with:
        image_name: 'snuba'
        platforms: linux/amd64
        dockerfile_path: 'Dockerfile'
        tag_suffix: -amd64
        ghcr: true
        tag_nightly: false
        tag_latest: false

  build-production:
    runs-on: ubuntu-24.04
    name: Build and push production image
    permissions:
      contents: read
      id-token: write
    if: ${{ github.ref_name == 'master' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: getsentry/action-build-and-push-images@8fc75e483c09a68721f2c8951292ee17f8821766
        with:
          image_name: 'snuba'
          platforms: linux/amd64
          dockerfile_path: './Dockerfile'
          ghcr: false
          tag_nightly: false
          tag_latest: false
          google_ar: true
          google_ar_image_name: us-docker.pkg.dev/sentryio/snuba-mr/image
          google_workload_identity_provider: projects/868781662168/locations/global/workloadIdentityPools/prod-github/providers/github-oidc-pool
          google_service_account: gha-gcr-push@sac-prod-sa.iam.gserviceaccount.com

  build-distroless:
    runs-on: ubuntu-24.04
    name: build-distroless
    permissions:
      contents: read
      packages: write
    if: github.repository_owner == 'getsentry'
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: getsentry/action-build-and-push-images@8fc75e483c09a68721f2c8951292ee17f8821766
      with:
        image_name: 'snuba'
        platforms: linux/amd64
        dockerfile_path: 'Dockerfile'
        build_target: 'application-distroless'
        tag_suffix: -distroless-amd64
        ghcr: true
        tag_nightly: false
        tag_latest: false

  build-debug:
    runs-on: ubuntu-24.04
    name: build-debug
    permissions:
      contents: read
      packages: write
    if: github.repository_owner == 'getsentry'
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: getsentry/action-build-and-push-images@8fc75e483c09a68721f2c8951292ee17f8821766
      with:
        image_name: 'snuba'
        platforms: linux/amd64
        dockerfile_path: 'Dockerfile'
        build_target: 'application-distroless-debug'
        tag_suffix: -debug-amd64
        ghcr: true
        tag_nightly: false
        tag_latest: false

  assemble:
    needs: [build]
    # Run on PRs too so that ghcr.io/getsentry/snuba:{sha} is available for
    # Sentry's devservices to reference in CI and local development.
    if: github.repository_owner == 'getsentry'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Docker Login
        run: docker login --username '${{ github.actor }}' --password-stdin ghcr.io <<< "$GHCR_TOKEN"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tag SHA image
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/getsentry/snuba:${{ github.sha }} \
            ghcr.io/getsentry/snuba:${{ github.sha }}-amd64

      - name: Tag nightly
        if: github.ref_name == 'master' && github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/getsentry/snuba:nightly \
            ghcr.io/getsentry/snuba:${{ github.sha }}-amd64

  assemble-distroless:
    needs: [build-distroless]
    if: ${{ (github.ref_name == 'master' || startsWith(github.ref_name, 'release/')) && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Docker Login
        run: docker login --username '${{ github.actor }}' --password-stdin ghcr.io <<< "$GHCR_TOKEN"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create distroless manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/getsentry/snuba:${{ github.sha }}-distroless \
            --tag ghcr.io/getsentry/snuba:nightly-distroless \
            ghcr.io/getsentry/snuba:${{ github.sha }}-distroless-amd64

  assemble-debug:
    needs: [build-debug]
    if: ${{ (github.ref_name == 'master' || startsWith(github.ref_name, 'release/')) && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Docker Login
        run: docker login --username '${{ github.actor }}' --password-stdin ghcr.io <<< "$GHCR_TOKEN"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create debug manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/getsentry/snuba:${{ github.sha }}-debug \
            --tag ghcr.io/getsentry/snuba:nightly-debug \
            ghcr.io/getsentry/snuba:${{ github.sha }}-debug-amd64

  self-hosted-end-to-end:
    needs: [build, assemble]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run Sentry self-hosted e2e CI
        uses: getsentry/self-hosted@master
        with:
          project_name: snuba
          image_url: ghcr.io/getsentry/snuba:${{ github.sha }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
