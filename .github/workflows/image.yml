on:
  pull_request:
  push:
    branches:
      - master
      - release/**

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    name: build
    permissions:
      contents: read
      packages: write
    if: github.repository_owner == 'getsentry'
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: getsentry/action-build-and-push-images@8fc75e483c09a68721f2c8951292ee17f8821766
      with:
        image_name: 'snuba'
        platforms: linux/amd64
        dockerfile_path: 'Dockerfile'
        tag_suffix: -amd64
        ghcr: true
        publish_on_pr: true
        tag_nightly: false
        tag_latest: false

  assemble:
    needs: [build]
    if: github.repository_owner == 'getsentry'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Docker Login
        run: docker login --username '${{ github.actor }}' --password-stdin ghcr.io <<< "$GHCR_TOKEN"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tag SHA image
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/getsentry/snuba:${{ github.sha }} \
            ghcr.io/getsentry/snuba:${{ github.sha }}-amd64
